name: "Gitleaks Secret Scan"

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 0 * * 0'  # Weekly Sunday 00:00 UTC
  workflow_dispatch:

jobs:
  scan-changes:
    name: "Layer 4: Scan Changes"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_COMMENTS: true

  weekly-audit:
    name: "Layer 5: Weekly Full Audit"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/
      - name: Scan
        id: gitleaks
        run: gitleaks detect --config=.gitleaks.toml --verbose --no-banner || echo "GITLEAKS_EXIT=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: Notify Slack
        if: steps.gitleaks.outputs.GITLEAKS_EXIT != '' && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} -H 'Content-Type: application/json' -d '{
            "text": "🚨 *Secret Scan Alert* 🚨",
            "blocks": [{
              "type": "section",
              "text": {"type": "mrkdwn", "text": "*Repository:* ${{ github.repository }}\n*Status:* ⚠️ Secrets Detected"}
            }]
          }'
      - name: Fail if secrets found
        if: steps.gitleaks.outputs.GITLEAKS_EXIT != ''
        run: exit 1
