<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="mic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Microphone body -->
  <rect x="412" y="200" width="200" height="340" rx="100" ry="100" fill="url(#mic)"/>

  <!-- Microphone stand arc -->
  <path d="M 312 440 Q 312 640 512 640 Q 712 640 712 440"
        stroke="url(#mic)" stroke-width="50" fill="none" stroke-linecap="round"/>

  <!-- Microphone stand vertical line -->
  <line x1="512" y1="640" x2="512" y2="760" stroke="url(#mic)" stroke-width="50" stroke-linecap="round"/>

  <!-- Microphone base -->
  <line x1="380" y1="760" x2="644" y2="760" stroke="url(#mic)" stroke-width="50" stroke-linecap="round"/>

  <!-- Sound waves left -->
  <path d="M 240 370 Q 190 440 240 510" stroke="rgba(255,255,255,0.6)" stroke-width="36" fill="none" stroke-linecap="round"/>
  <path d="M 160 320 Q 80 440 160 560" stroke="rgba(255,255,255,0.4)" stroke-width="36" fill="none" stroke-linecap="round"/>

  <!-- Sound waves right -->
  <path d="M 784 370 Q 834 440 784 510" stroke="rgba(255,255,255,0.6)" stroke-width="36" fill="none" stroke-linecap="round"/>
  <path d="M 864 320 Q 944 440 864 560" stroke="rgba(255,255,255,0.4)" stroke-width="36" fill="none" stroke-linecap="round"/>
</svg>
